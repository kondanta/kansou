# kansou — example configuration
# Copy this file to ~/.config/kansou/config.toml and edit to taste.
#
# Full documentation: docs/CONFIG.md
# All fields are optional — kansou runs with built-in defaults if no
# config file is found.

# ---------------------------------------------------------------
# Genre multiplier ceiling
#
# All multiplier values in [genres.*] blocks must be > 0.0 and
# ≤ max_multiplier. Raise this if you need more aggressive genre
# bias than 2.0 allows. Use --weight for one-off per-session
# adjustments instead of changing this globally.
# ---------------------------------------------------------------

max_multiplier = 2.0

# ---------------------------------------------------------------
# Primary genre blend ratio (ADR-022)
#
# When --primary-genre is passed to `score add` (or primary_genre is
# set in POST /score), the effective multiplier for each dimension is:
#
#   final = (primary_mult × primary_genre_weight)
#         + (secondary_avg × (1 − primary_genre_weight))
#
# where primary_mult is the primary genre's raw multiplier for the
# dimension and secondary_avg is the contributing-only average across the other
# matched genres.
#
# Range: 0.0–1.0. 0.0 disables the blend (falls back to contributing-only averaging).
# Default: 0.6
# ---------------------------------------------------------------

primary_genre_weight = 0.6

# ---------------------------------------------------------------
# Dimensions
#
# Each key is the internal identifier used in genre blocks and output.
# Keys must be lowercase snake_case.
#
# Fields:
#   label          — display name shown in CLI prompts and output
#   description    — hint shown during the scoring session
#   weight         — base weight; all weights must sum to 1.0
#   bias_resistant — if true, genre multipliers never affect this
#                    dimension. Default: false.
# ---------------------------------------------------------------

[dimensions.story]
label = "Story"
description = "Plot, hook, themes, and how well the narrative concludes"
weight = 0.25
bias_resistant = false

[dimensions.enjoyment]
label = "Enjoyment"
description = "Gut feeling. How much fun did you have? Did you look forward to the next entry?"
weight = 0.15
bias_resistant = true

[dimensions.characters]
label = "Characters"
description = "Relatability, growth arcs, and chemistry between the cast"
weight = 0.20
bias_resistant = false

[dimensions.production]
label = "Production"
description = "Anime: animation fluidity, voice acting, OST. Manga: art style, character design, paneling"
weight = 0.15
bias_resistant = false

[dimensions.pacing]
label = "Pacing"
description = "How well the story flows. Is it dragging? Rushed? Does it keep you hooked?"
weight = 0.10
bias_resistant = false

[dimensions.world_building]
label = "World Building"
description = "The setting, rules/systems, and how immersive the lore feels"
weight = 0.10
bias_resistant = false

[dimensions.value]
label = "Value"
description = "Rewatch/reread value. Does it have staying power in your mind?"
weight = 0.05
bias_resistant = true

# ---------------------------------------------------------------
# Genre bias multipliers
#
# Multiplier semantics:
#   1.0  — no change (default for any dimension not listed)
#   >1.0 — this dimension carries more weight for this genre
#   <1.0 — this dimension carries less weight for this genre
#
# Multi-genre contributing-only averaging: only genres that explicitly define a multiplier
# for a given dimension are included in the average. Genres with no
# opinion on a dimension are excluded, not treated as 1.0.
#
# Bias-resistant dimensions: multipliers listed here for
# bias_resistant dimensions are silently ignored by the engine.
#
# Genre keys must match AniList genre strings (case-insensitive).
# ---------------------------------------------------------------

[genres.action]
production = 1.4
pacing = 1.3
story = 0.8
world_building = 0.9

[genres.adventure]
world_building = 1.3
pacing = 1.1
story = 1.1

[genres.comedy]
characters = 1.2
pacing = 1.1
story = 0.8
world_building = 0.7

[genres.drama]
story = 1.4
characters = 1.3
production = 0.8
pacing = 1.1

[genres.fantasy]
world_building = 1.5
story = 1.1
production = 1.1

[genres.horror]
production = 1.3
pacing = 1.2
story = 1.1

[genres.mystery]
story = 1.5
pacing = 1.3
world_building = 1.2

[genres.psychological]
story = 1.4
characters = 1.3
pacing = 1.1
world_building = 1.1
production = 0.8

[genres.romance]
characters = 1.4
story = 1.1

[genres.sci-fi]
world_building = 1.4
story = 1.2
production = 1.1

[genres.slice_of_life]
characters = 1.4
world_building = 0.7
story = 0.8
pacing = 0.9

[genres.sports]
pacing = 1.3
characters = 1.2
production = 1.2
story = 0.9
world_building = 0.7

[genres.supernatural]
world_building = 1.3
story = 1.1
production = 1.1

[genres.thriller]
story = 1.4
pacing = 1.4
characters = 1.1
production = 0.9

[genres.mecha]
production = 1.4
world_building = 1.2
pacing = 1.1

# ---------------------------------------------------------------
# Server (kansou serve)
#
# Port is overridable at runtime with --port flag.
# Flag takes precedence over this value.
# ---------------------------------------------------------------

[server]
port = 8080

# CORS allowed origins. Add your frontend origin here.
cors_allowed_origins = [
    "http://localhost:3000",
    "http://localhost:5173",
    "http://localhost:8080",
]
