# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: kansou

before:
  hooks:
    - go mod tidy

builds:
  - id: kansou
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/kondanta/kansou/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
    main: .
    binary: kansou

archives:
  - id: kansou
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  algorithm: sha256
  split: true

dockers:
  - id: kansou-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/kondanta/kansou:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

  - id: kansou-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/kondanta/kansou:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

  - id: kansou-armv7
    goos: linux
    goarch: arm
    goarm: "7"
    image_templates:
      - "ghcr.io/kondanta/kansou:{{ .Tag }}-armv7"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm/v7"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

docker_manifests:
  - name_template: "ghcr.io/kondanta/kansou:{{ .Tag }}"
    image_templates:
      - "ghcr.io/kondanta/kansou:{{ .Tag }}-amd64"
      - "ghcr.io/kondanta/kansou:{{ .Tag }}-arm64"
      - "ghcr.io/kondanta/kansou:{{ .Tag }}-armv7"
  - name_template: "ghcr.io/kondanta/kansou:latest"
    image_templates:
      - "ghcr.io/kondanta/kansou:{{ .Tag }}-amd64"
      - "ghcr.io/kondanta/kansou:{{ .Tag }}-arm64"
      - "ghcr.io/kondanta/kansou:{{ .Tag }}-armv7"

release:
  # keep-existing: goreleaser uploads artifacts to the release-please-created release
  # and never touches the release body, title, or changelog.
  mode: keep-existing

changelog:
  # release-please owns the changelog; goreleaser only uploads artifacts.
  disable: true
