basePath: /
definitions:
  anilist.GenreConfigStatus:
    properties:
      isConfigured:
        type: boolean
      name:
        type: string
    type: object
  server.breakdownRowResponse:
    properties:
      applied_multiplier:
        type: number
      base_weight:
        type: number
      bias_resistant:
        type: boolean
      contribution:
        type: number
      effective_weight:
        type: number
      final_weight:
        type: number
      genre_deselected:
        type: boolean
      key:
        type: string
      label:
        type: string
      primary_genre:
        type: string
      primary_genre_multiplier:
        type: number
      score:
        type: number
      secondary_genres_multiplier:
        type: number
      skipped:
        type: boolean
      weight_override:
        type: boolean
    type: object
  server.configDimensionEntry:
    properties:
      bias_resistant:
        type: boolean
      description:
        type: string
      label:
        type: string
      weight:
        type: number
    type: object
  server.configPayload:
    properties:
      config_hash:
        type: string
      dimension_order:
        items:
          type: string
        type: array
      dimensions:
        additionalProperties:
          $ref: '#/definitions/server.configDimensionEntry'
        type: object
      genres:
        additionalProperties:
          additionalProperties:
            format: float64
            type: number
          type: object
        type: object
      max_history:
        type: integer
      max_multiplier:
        type: number
      primary_genre_weight:
        type: number
    type: object
  server.dbInfoResponse:
    properties:
      db:
        description: DB is "sqlite", "postgres", or null in DBless mode.
        type: string
      live_config:
        description: |-
          LiveConfig is only present in DBless mode — it is not meaningful in DB
          mode, where config is always writable via POST /config.
        type: boolean
    type: object
  server.dimensionItem:
    properties:
      description:
        description: Description is the scoring hint shown to the user.
        type: string
      key:
        description: Key is the internal identifier used in the scores map of POST
          /score.
        type: string
      label:
        description: Label is the human-readable display name.
        type: string
      weight:
        description: Weight is the base weight for this dimension (all weights sum
          to 1.0).
        type: number
    type: object
  server.dimensionsResponse:
    properties:
      config_hash:
        description: |-
          ConfigHash is the SHA256 digest of the current dimensions config.
          Clients can use this to detect when the dimension list has changed.
        type: string
      dimensions:
        description: Dimensions is the ordered list of scoring dimensions.
        items:
          $ref: '#/definitions/server.dimensionItem'
        type: array
    type: object
  server.errorResponse:
    properties:
      error:
        description: Error is a human-readable description of what went wrong.
        type: string
    type: object
  server.genreMultiplierItem:
    properties:
      genre:
        description: Genre is the AniList genre name (lowercased).
        type: string
      multipliers:
        additionalProperties:
          format: float64
          type: number
        description: Multipliers maps dimension keys to their configured multiplier
          values.
        type: object
    type: object
  server.genreStatsResponse:
    properties:
      genre_breakdown:
        items:
          $ref: '#/definitions/store.GenreStat'
        type: array
      genre_dimension_affinity:
        items:
          $ref: '#/definitions/store.GenreDimensionAffinity'
        type: array
      score_by_genre:
        items:
          $ref: '#/definitions/store.GenreScore'
        type: array
    type: object
  server.genresResponse:
    properties:
      genres:
        description: Genres is the list of configured genre multiplier blocks, sorted
          alphabetically.
        items:
          $ref: '#/definitions/server.genreMultiplierItem'
        type: array
      primary_genre_weight:
        description: PrimaryGenreWeight is the configured blend ratio for primary
          genre support.
        type: number
    type: object
  server.historyListItem:
    properties:
      anilist_id:
        type: integer
      cover_image:
        type: string
      entry_count:
        type: integer
      final_score:
        type: number
      format:
        type: string
      media_type:
        type: string
      score_id:
        type: integer
      scored_at:
        type: string
      title_romaji:
        type: string
    type: object
  server.historyStatsResponse:
    properties:
      config_impact:
        items:
          $ref: '#/definitions/store.ConfigImpactStat'
        type: array
      most_rescored:
        items:
          $ref: '#/definitions/store.RescoredStat'
        type: array
      outliers:
        items:
          $ref: '#/definitions/store.OutlierStat'
        type: array
    type: object
  server.mediaResponse:
    properties:
      anilist_url:
        type: string
      average_score:
        type: integer
      banner_image:
        type: string
      chapters:
        type: integer
      cover_image:
        type: string
      episodes:
        type: integer
      format:
        type: string
      genres:
        items:
          $ref: '#/definitions/anilist.GenreConfigStatus'
        type: array
      id:
        type: integer
      mean_score:
        type: integer
      media_type:
        type: string
      status:
        type: string
      title_english:
        type: string
      title_native:
        type: string
      title_romaji:
        type: string
    type: object
  server.publishRequest:
    properties:
      media_id:
        description: MediaID is the AniList media ID to publish the score for.
        type: integer
      notes:
        description: |-
          Notes is an optional pre-formatted scoring breakdown to append to the
          AniList list entry notes. If the entry already has notes, the new block
          is appended after a "---" separator so existing content is preserved.
          Omit or leave empty to skip writing notes entirely.
        example: |-
          Frieren: Beyond Journey's End
          Score: 9.73 / 10  [kansou]
        type: string
      score:
        description: Score is the final score to publish (e.g. 8.79).
        type: number
    type: object
  server.publishResponse:
    properties:
      message:
        description: Message is a human-readable confirmation.
        type: string
      score:
        description: Score is the score that was written.
        type: number
      title:
        description: Title is the media title as confirmed by AniList.
        type: string
    type: object
  server.scoreRequest:
    properties:
      media_id:
        description: MediaID is the AniList media ID of the entry being scored.
        type: integer
      primary_genre:
        description: |-
          PrimaryGenre designates one of the media's genres as constitutive for
          blended multiplier calculation. Must match one of the active genres
          (case-insensitive). Optional — omit to use contributing-only averaging with no primary.
        example: Mystery
        type: string
      scores:
        additionalProperties:
          format: float64
          type: number
        description: |-
          Scores maps dimension keys to user scores (1.0–10.0).
          Any configured dimension absent from this map is treated as skipped (N/A).
        type: object
      selected_genres:
        description: |-
          SelectedGenres, if non-empty, restricts multiplier calculation to this
          subset of the media's AniList genres. Genres absent from this list but
          present in config are recorded as deselected in the breakdown. When
          omitted, all matched config genres participate (CLI-compatible behaviour).
        items:
          type: string
        type: array
      weight_overrides:
        additionalProperties:
          format: float64
          type: number
        description: |-
          WeightOverrides maps dimension keys to per-session weight overrides.
          Optional — omit to use the weights defined in server config.
        type: object
    type: object
  server.scoreResponse:
    properties:
      breakdown:
        description: Breakdown is the per-dimension audit trail.
        items:
          $ref: '#/definitions/server.breakdownRowResponse'
        type: array
      final_score:
        description: FinalScore is the computed weighted score (rounded to 2 decimal
          places).
        type: number
      meta:
        allOf:
        - $ref: '#/definitions/server.sessionMetaResponse'
        description: Meta carries session-level provenance.
    type: object
  server.sessionMetaResponse:
    properties:
      all_genres:
        items:
          type: string
        type: array
      anilist_url:
        type: string
      config_hash:
        type: string
      effective_weight_sum:
        type: number
      genres_active:
        items:
          type: string
        type: array
      matched_genres:
        items:
          type: string
        type: array
      media_id:
        type: integer
      media_type:
        type: string
      primary_genre:
        type: string
      primary_genre_weight:
        type: number
      title_english:
        type: string
      title_romaji:
        type: string
    type: object
  server.weightDimensionRow:
    properties:
      base_weight:
        description: BaseWeight is the configured weight before genre adjustment.
        type: number
      bias_resistant:
        description: BiasResistant indicates this dimension's multiplier is always
          1.0.
        type: boolean
      effective_weight:
        description: EffectiveWeight is BaseWeight × Multiplier before renormalization.
        type: number
      final_weight:
        description: FinalWeight is the weight after genre adjustment, renormalization,
          and overrides.
        type: number
      key:
        description: Key is the dimension's config key.
        type: string
      label:
        description: Label is the human-readable display name.
        type: string
      multiplier:
        description: Multiplier is the blended genre multiplier applied (1.0 when
          bias-resistant or no genre opinion).
        type: number
      primary_genre_multiplier:
        description: |-
          PrimaryGenreMultiplier is the raw multiplier the primary genre defines for this
          dimension. 0 when no primary genre is set or the dimension is bias-resistant.
        type: number
      secondary_genres_multiplier:
        description: |-
          SecondaryGenresMultiplier is the contributing-only average multiplier across
          all non-primary matched genres. 0 when no primary genre is set, when there are
          no non-primary genres (ADR-025), or when the dimension is bias-resistant.
        type: number
      skipped:
        description: Skipped indicates this dimension is excluded from the weight
          pool.
        type: boolean
      weight_override:
        description: WeightOverride indicates the final weight was set by a weight
          override.
        type: boolean
    type: object
  server.weightsRequest:
    properties:
      media_id:
        description: MediaID is the AniList media ID. Used to fetch the media's genre
          list.
        type: integer
      primary_genre:
        description: |-
          PrimaryGenre designates one genre as constitutive for blended multiplier
          calculation. Must be present in SelectedGenres when that field is provided,
          otherwise must be in the media's AniList genre list.
        example: Mystery
        type: string
      selected_genres:
        description: |-
          SelectedGenres, if non-empty, restricts the active genre set for weight
          calculation. When omitted, all matched config genres participate.
        items:
          type: string
        type: array
      skipped_dimensions:
        additionalProperties:
          type: boolean
        description: |-
          SkippedDimensions maps dimension keys to true to exclude them from the
          weight pool before renormalization. Optional.
        type: object
      weight_overrides:
        additionalProperties:
          format: float64
          type: number
        description: |-
          WeightOverrides maps dimension keys to per-session weight overrides.
          Optional — omit to use config weights.
        type: object
    type: object
  server.weightsResponse:
    properties:
      dimensions:
        description: Dimensions is the ordered list of per-dimension weight rows.
        items:
          $ref: '#/definitions/server.weightDimensionRow'
        type: array
      effective_weight_sum:
        description: |-
          EffectiveWeightSum is the sum of all per-dimension effective weights before renormalization.
          Dividing any dimension's effective_weight by this value reproduces its final_weight.
        type: number
      primary_genre_weight:
        description: |-
          PrimaryGenreWeight is the blend ratio applied when a primary genre is set (0–1).
          A value of 0.6 means 60 % primary, 40 % secondary average.
        type: number
    type: object
  stats.Summary:
    properties:
      lastPruneAt:
        description: LastPruneAt is nil if `kansou db prune` has never run.
        type: string
      leastConsistentDim:
        $ref: '#/definitions/store.DimensionVarianceStat'
      mostConsistentDim:
        $ref: '#/definitions/store.DimensionVarianceStat'
      mostRescored:
        allOf:
        - $ref: '#/definitions/store.RescoredStat'
        description: MostRescored is nil unless some entry has been scored more than
          once.
      outlierCount:
        type: integer
      overallConsistency:
        $ref: '#/definitions/store.ConsistencyStat'
      topGenre:
        $ref: '#/definitions/store.GenreStat'
      topScoringGenre:
        $ref: '#/definitions/store.GenreScore'
    type: object
  store.ConfigImpactStat:
    properties:
      avgScore:
        format: float64
        type: number
      configHash:
        type: string
      entryCount:
        type: integer
      firstScoredAt:
        type: string
      lastScoredAt:
        type: string
    type: object
  store.ConsistencyStat:
    properties:
      avgStdDev:
        format: float64
        type: number
      count:
        type: integer
    type: object
  store.DimensionAvg:
    properties:
      avgScore:
        format: float64
        type: number
      dimensionKey:
        type: string
      label:
        type: string
    type: object
  store.DimensionCorrelationStat:
    properties:
      correlation:
        description: Pearson -1.0 to 1.0
        format: float64
        type: number
      dimensionA:
        type: string
      dimensionB:
        type: string
    type: object
  store.DimensionScoreRow:
    properties:
      applied_multiplier:
        type: number
      base_weight:
        type: number
      bias_resistant:
        type: boolean
      contribution:
        description: nil if skipped
        type: number
      dimension_key:
        type: string
      final_weight:
        type: number
      genre_deselected:
        description: |-
          GenreDeselected is true when a deselected genre would have contributed
          to this dimension's multiplier.
        type: boolean
      label:
        type: string
      primary_genre_multiplier:
        description: |-
          PrimaryGenreMultiplier is the raw multiplier the primary genre defined for
          this dimension at scoring time. 0 when no primary genre was set or the
          dimension is bias-resistant.
        type: number
      score:
        description: nil if skipped
        type: number
      secondary_genres_multiplier:
        description: |-
          SecondaryGenresMultiplier is the contributing-only average multiplier
          across non-primary matched genres at scoring time. 0 when no primary genre
          was set, there were no secondary genres, or the dimension is bias-resistant.
        type: number
      skipped:
        type: boolean
      weight_override:
        type: boolean
    type: object
  store.DimensionStatsResponse:
    properties:
      correlation_insufficient:
        description: CorrelationInsufficient is true when no pairs met the minimum
          threshold.
        type: boolean
      dimensionCorrelation:
        items:
          $ref: '#/definitions/store.DimensionCorrelationStat'
        type: array
      dimensionVariance:
        items:
          $ref: '#/definitions/store.DimensionVarianceStat'
        type: array
      scoringConsistency:
        $ref: '#/definitions/store.ConsistencyStat'
      skippedDimensions:
        items:
          $ref: '#/definitions/store.SkippedDimStat'
        type: array
      weightOverrides:
        items:
          $ref: '#/definitions/store.WeightOverrideStat'
        type: array
    type: object
  store.DimensionVarianceStat:
    properties:
      avgScore:
        format: float64
        type: number
      count:
        type: integer
      dimensionKey:
        type: string
      label:
        type: string
      stdDev:
        format: float64
        type: number
    type: object
  store.GenreDimensionAffinity:
    properties:
      dimensions:
        items:
          $ref: '#/definitions/store.DimensionAvg'
        type: array
      genre:
        type: string
    type: object
  store.GenreScore:
    properties:
      avgScore:
        format: float64
        type: number
      count:
        type: integer
      genre:
        type: string
    type: object
  store.GenreStat:
    properties:
      count:
        type: integer
      genre:
        type: string
      percentage:
        format: float64
        type: number
    type: object
  store.MatchedGenreRow:
    properties:
      genre:
        type: string
      is_primary:
        type: boolean
    type: object
  store.OutlierStat:
    properties:
      anilistID:
        type: integer
      deviation:
        description: how many std devs from personal avg
        format: float64
        type: number
      dimensionKey:
        type: string
      label:
        type: string
      personalAvg:
        format: float64
        type: number
      score:
        format: float64
        type: number
      scoreID:
        type: integer
      scoredAt:
        type: string
      titleRomaji:
        type: string
    type: object
  store.RescoredStat:
    properties:
      anilistID:
        type: integer
      firstScoredAt:
        type: string
      lastScoredAt:
        type: string
      latestScore:
        description: |-
          LatestScore is nil if every non-deleted score for this media has had
          is_latest unset (e.g. the latest score was removed via SoftDeleteScore
          without a replacement being scored yet). ScoreCount is still counted
          from non-deleted rows regardless.
        format: float64
        type: number
      scoreCount:
        type: integer
      titleRomaji:
        type: string
    type: object
  store.Score:
    properties:
      active_genres:
        items:
          $ref: '#/definitions/store.MatchedGenreRow'
        type: array
      anilist_id:
        type: integer
      breakdown:
        items:
          $ref: '#/definitions/store.DimensionScoreRow'
        type: array
      config_hash:
        type: string
      cover_image:
        type: string
      deleted_at:
        type: string
      entry_count:
        description: |-
          EntryCount is the number of non-deleted scores for this media entry.
          Only populated by ListLatest; zero on rows returned by ScoreHistory or
          LatestScore, where the caller already has the full list to count.
        type: integer
      final_score:
        type: number
      format:
        type: string
      genres:
        items:
          type: string
        type: array
      id:
        type: integer
      is_latest:
        type: boolean
      media_type:
        type: string
      primary_genre:
        type: string
      primary_genre_weight:
        type: number
      scored_at:
        type: string
      title_english:
        type: string
      title_romaji:
        type: string
      user_selected_genres:
        description: UserSelectedGenres is nil if the user did not explicitly select
          genres.
        items:
          type: string
        type: array
    type: object
  store.SkippedDimStat:
    properties:
      dimensionKey:
        type: string
      label:
        type: string
      mediaType:
        type: string
      skipCount:
        type: integer
      totalCount:
        type: integer
    type: object
  store.WeightOverrideStat:
    properties:
      dimensionKey:
        type: string
      label:
        type: string
      overrideCount:
        type: integer
    type: object
info:
  contact:
    name: kansou
  description: Personal anime/manga scoring tool with AniList integration.
  license:
    name: MIT
  title: kansou API
  version: "1.0"
paths:
  /api/v1/config:
    get:
      description: Returns the current scoring config (dimensions, genres, weights).
        Only available when --live-config is set.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.configPayload'
      summary: Get config
      tags:
      - config
    post:
      consumes:
      - application/json
      description: Replaces the scoring config (dimensions, genres, weights) and reloads
        the engine atomically. Persists to the database in DB mode, or to disk otherwise.
        Only available when --live-config is set.
      parameters:
      - description: New config (config_hash is ignored)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/server.configPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.configPayload'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.errorResponse'
      summary: Update config
      tags:
      - config
  /api/v1/db-info:
    get:
      description: Reports the active database backend, or DBless live-config status.
        Always available.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.dbInfoResponse'
      summary: Database info
      tags:
      - system
  /api/v1/dimensions:
    get:
      description: Returns the ordered list of scoring dimensions defined in server
        config. Use the returned keys in the scores map when calling POST /score.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.dimensionsResponse'
      summary: List scoring dimensions
      tags:
      - score
  /api/v1/genres:
    get:
      description: Returns all configured genre multiplier blocks and the primary
        genre blend ratio.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.genresResponse'
      summary: List genre multipliers
      tags:
      - score
  /api/v1/history:
    get:
      description: Returns the latest score for every scored entry, ordered by scored_at
        descending. Requires a database.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/server.historyListItem'
            type: array
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/server.errorResponse'
      summary: List history
      tags:
      - history
  /api/v1/history/{anilist_id}:
    get:
      description: Returns all non-deleted scores for one AniList media ID, newest
        first, with full breakdown. Requires a database.
      parameters:
      - description: AniList media ID
        in: path
        name: anilist_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Score'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.errorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/server.errorResponse'
      summary: Show history detail
      tags:
      - history
  /api/v1/history/{score_id}:
    delete:
      description: Soft-deletes a score by its row ID (not the AniList ID). Deliberate
        removal from active tracking — does not promote any other score to latest.
        Requires a database.
      parameters:
      - description: scores.id primary key
        in: path
        name: score_id
        required: true
        type: integer
      - description: hard delete (permanent removal) if true, soft delete otherwise
        in: query
        name: hard
        type: boolean
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.errorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/server.errorResponse'
      summary: Delete a history entry
      tags:
      - history
  /api/v1/history/{score_id}/promote:
    post:
      description: Restores a soft-deleted score by its row ID, making it the active
        (is_latest = 1) score for its media, while simultaneously soft-deleting the
        currently active score. Requires a database.
      parameters:
      - description: scores.id primary key
        in: path
        name: score_id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/server.errorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/server.errorResponse'
      summary: Promote a history entry
      tags:
      - history
  /api/v1/media/{id}:
    get:
      description: Fetch an anime or manga entry by its AniList media ID.
      parameters:
      - description: AniList media ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.mediaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.errorResponse'
        "404":
          description: Not Found
          schema:
