# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release
on:
  release:
    types:
      - published
permissions: {}
jobs:
  # ── Vue UI download ───────────────────────────────────────────────────────────
  # Downloads the pre-built tribbie dist zip from its GitHub release.
  # Output is uploaded as an artifact and consumed by each binary build job.
  build-ui:
    name: Download tribbie UI
    runs-on: i7
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Download tribbie release
        run: |
          version=$(cat TRIBBIE_VERSION)
          gh release download "$version" --repo sasalx/tribbie --pattern "tribbie-${version}.zip"
          unzip "tribbie-${version}.zip" -d web/
          touch web/dist/.gitkeep
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error
  # ── GoReleaser ───────────────────────────────────────────────────────────────
  # Builds binaries for linux (amd64, arm64, armv7), darwin (amd64, arm64), and
  # windows (amd64). Uploads archives + per-artifact SHA256 checksums to the
  # GitHub release created by release-please. Does not touch the release body.
  goreleaser:
    name: GoReleaser
    needs: build-ui
    runs-on: i7
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: web-dist
          path: web/dist/
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true
          install_args: --locked
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "v2.17.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # ── Helm chart ───────────────────────────────────────────────────────────────
  # Packages the chart and pushes it to ghcr.io as an OCI artifact.
  # Both chart version and appVersion are set to the release tag so they stay
  # in sync automatically — no manual chart version bumps required.
  # Install with: helm install kansou oci://ghcr.io/kondanta/charts/kansou --version <version>
  release-chart:
    name: Helm chart
    runs-on: i7
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      - name: Lint chart
        run: helm lint charts/kansou
      - name: Login to GHCR
        env:
          ACTOR: ${{ github.actor }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "$ACTOR" --password-stdin
      - name: Package chart
        run: |
          helm package charts/kansou \
            --version "${GITHUB_REF_NAME#v}" \
            --app-version "${GITHUB_REF_NAME#v}"
      - name: Push chart
        run: helm push kansou-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
