name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Vue UI build ──────────────────────────────────────────────────────────────
  # Builds the tribbie frontend natively on the runner.
  # Output is uploaded as an artifact and consumed by each binary build job.
  build-ui:
    name: Build Vue UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/tribbie/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        working-directory: web/tribbie
        run: pnpm install

      - name: Build Vue UI
        working-directory: web/tribbie
        run: VITE_API_BASE_URL= pnpm exec vite build

      - name: Copy dist to web/dist
        run: |
          cp -r web/tribbie/dist/. web/dist/
          touch web/dist/.gitkeep

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error

  # ── Binary build ─────────────────────────────────────────────────────────────
  # All three targets cross-compile on ubuntu-latest via GOARCH/GOARM.
  # CGO is disabled — fully static binaries with no runtime dependencies.
  build-binary:
    name: Binary (${{ matrix.artifact }})
    needs: build-ui
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            goarm: ""
            artifact: kansou-linux-amd64
          - goarch: arm64
            goarm: ""
            artifact: kansou-linux-arm64
          - goarch: arm
            goarm: "7"
            artifact: kansou-linux-armv7

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags "-s -w -X github.com/kondanta/kansou/cmd.version=${GITHUB_REF_NAME}" \
            -o ${{ matrix.artifact }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kansou-linux-amd64
            kansou-linux-arm64
            kansou-linux-armv7

  # ── Docker image ─────────────────────────────────────────────────────────────
  # Downloads the pre-built binaries and injects them into the image — no
  # compilation here. QEMU is registered only for buildx platform awareness;
  # each platform simply COPYs the right pre-built binary via TARGETPLATFORM.
  build-docker:
    name: Docker image
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Mark binaries executable
        run: chmod +x kansou-linux-amd64 kansou-linux-arm64 kansou-linux-armv7

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
