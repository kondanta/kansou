replicaCount: 1

image:
  repository: ghcr.io/kondanta/kansou
  # tag defaults to Chart.appVersion when left empty
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

httpRoute:
  enabled: false
  # Gateway this HTTPRoute attaches to.
  gateway:
    name: ""
    namespace: ""
    # sectionName targets a specific listener on the Gateway (e.g. "https").
    # Omit to attach to all listeners.
    sectionName: ""
  # hostnames filters which Host headers this route matches.
  # Leave empty to match all hosts on the Gateway.
  hostnames: []
  #   - kansou.example.com
  path: "/"

# clientTrafficPolicy configures an Envoy Gateway ClientTrafficPolicy to ensure
# correct X-Forwarded-For handling for per-IP rate limiting.
#
# By default Envoy appends to X-Forwarded-For rather than overwriting it, so a
# client can spoof the header to bypass rate limits (httprate reads the leftmost
# value). Setting numTrustedHops: 1 tells Envoy to strip client-supplied XFF
# values and set the header to the real client IP before forwarding to kansou.
#
# Note: ClientTrafficPolicy targets a Gateway, not a single route — enabling
# this affects XFF handling for all services behind the same Gateway. This is
# generally desirable but worth knowing in a shared-gateway setup.
#
# Requires: gateway.envoyproxy.io CRDs (Envoy Gateway) installed in the cluster.
clientTrafficPolicy:
  enabled: false
  # targetGateway must reference the same Gateway used in httpRoute.
  targetGateway:
    name: ""
    namespace: ""
  # numTrustedHops tells Envoy how many proxy hops to trust when deriving the
  # real client IP. Set to 1 for a single Envoy Gateway with no additional
  # proxies in front of it.
  numTrustedHops: 1

# ANILIST_TOKEN injected as an environment variable.
# Set this via --set anilistToken=<token> or a values override file.
# Never commit a real token here.
anilistToken: ""

# Raw config.toml content. Mounted into the container at /etc/kansou/config.toml.
# This matches kansou's built-in defaults. Override any value in your own values file.
config: |
  max_multiplier = 2.0
  primary_genre_weight = 0.6

  [dimensions.story]
  label = "Story"
  weight = 0.25
  bias_resistant = false

  [dimensions.enjoyment]
  label = "Enjoyment"
  weight = 0.15
  bias_resistant = true

  [dimensions.characters]
  label = "Characters"
  weight = 0.20
  bias_resistant = false

  [dimensions.production]
  label = "Production"
  weight = 0.15
  bias_resistant = false

  [dimensions.pacing]
  label = "Pacing"
  weight = 0.10
  bias_resistant = false

  [dimensions.world_building]
  label = "World Building"
  weight = 0.10
  bias_resistant = false

  [dimensions.value]
  label = "Value"
  weight = 0.05
  bias_resistant = true

  [genres.action]
  production = 1.4
  pacing = 1.3
  story = 0.8
  world_building = 0.9

  [genres.adventure]
  world_building = 1.3
  pacing = 1.1
  story = 1.1

  [genres.comedy]
  characters = 1.2
  pacing = 1.1
  story = 0.8
  world_building = 0.7

  [genres.drama]
  story = 1.4
  characters = 1.3
  production = 0.8
  pacing = 1.1

  [genres.fantasy]
  world_building = 1.5
  story = 1.1
  production = 1.1

  [genres.horror]
  production = 1.3
  pacing = 1.2
  story = 1.1

  [genres.mystery]
  story = 1.5
  pacing = 1.3
  world_building = 1.2

  [genres.psychological]
  story = 1.4
  characters = 1.3
  pacing = 1.1
  world_building = 1.1
  production = 0.8

  [genres.romance]
  characters = 1.4
  story = 1.1

  [genres.sci-fi]
  world_building = 1.4
  story = 1.2
  production = 1.1

  [genres.slice_of_life]
  characters = 1.4
  world_building = 0.7
  story = 0.8
  pacing = 0.9

  [genres.sports]
  pacing = 1.3
  characters = 1.2
  production = 1.2
  story = 0.9
  world_building = 0.7

  [genres.supernatural]
  world_building = 1.3
  story = 1.1
  production = 1.1

  [genres.thriller]
  story = 1.4
  pacing = 1.4
  characters = 1.1
  production = 0.9

  [genres.mecha]
  production = 1.4
  world_building = 1.2
  pacing = 1.1

  [server]
  port = 8080
  cors_allowed_origins = []

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  create: true
  name: ""
