{{- if not (has .Values.db.type (list "" "sqlite" "postgres")) }}
{{- fail (printf "db.type must be \"\", \"sqlite\", or \"postgres\", got %q" .Values.db.type) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kansou.fullname" . }}
  labels:
    {{- include "kansou.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kansou.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kansou.labels" . | nindent 8 }}
      {{- if .Values.config }}
      annotations:
        # Restart pods automatically when config.toml changes.
        checksum/config: {{ .Values.config | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kansou.serviceAccountName" . }}
      {{- if .Values.defaultPodOptions }}
      {{- with .Values.defaultPodOptions.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- if or (and .Values.config .Values.liveConfig.enabled) .Values.extraInitContainers }}
      initContainers:
        {{- if and .Values.config .Values.liveConfig.enabled }}
        - name: config-seed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Only seed on first run; preserve POST /config changes on subsequent pod starts.
          command: ["/bin/sh", "-c", "[ -f /etc/kansou/config.toml ] || cp /config-source/config.toml /etc/kansou/config.toml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config-source
              mountPath: /config-source
              readOnly: true
            - name: config
              mountPath: /etc/kansou
        {{- end }}
        {{- if .Values.extraInitContainers }}
        {{- toYaml .Values.extraInitContainers | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: kansou
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - serve
            {{- if .Values.config }}
            - --config
            - /etc/kansou/config.toml
            {{- end }}
            {{- if .Values.liveConfig.enabled }}
            - --live-config
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: ANILIST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kansou.fullname" . }}
                  key: ANILIST_TOKEN
            - name: KANSOU_PORT
              value: {{ .Values.service.port | quote }}
            - name: TRUST_PROXY
              value: {{ .Values.trustProxy | quote }}
            {{- if .Values.corsAllowedOrigins }}
            - name: KANSOU_CORS_ORIGINS
              value: {{ join "," .Values.corsAllowedOrigins | quote }}
            {{- end }}
            {{- if eq .Values.db.type "sqlite" }}
            - name: KANSOU_DB_TYPE
              value: "sqlite"
            - name: KANSOU_DB_PATH
              value: {{ .Values.db.sqlite.path | quote }}
            {{- else if eq .Values.db.type "postgres" }}
            - name: KANSOU_DB_TYPE
              value: "postgres"
            - name: POSTGRES_HOST
              value: {{ .Values.db.postgres.host | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.db.postgres.port | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.db.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.db.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kansou.fullname" . }}
                  key: POSTGRES_PASSWORD
            {{- end }}
          {{- if .Values.envFrom }}
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- if or .Values.config (eq .Values.db.type "sqlite") }}
          volumeMounts:
            {{- if .Values.config }}
            - name: config
              mountPath: /etc/kansou
              {{- if not .Values.liveConfig.enabled }}
              readOnly: true
              {{- end }}
            {{- end }}
            {{- if eq .Values.db.type "sqlite" }}
            - name: db-data
              mountPath: /data
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if or .Values.config (eq .Values.db.type "sqlite") }}
      volumes:
        {{- if .Values.config }}
        {{- if .Values.liveConfig.enabled }}
        - name: config-source
          configMap:
            name: {{ include "kansou.fullname" . }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ include "kansou.fullname" . }}-config
        {{- else }}
        - name: config
          configMap:
            name: {{ include "kansou.fullname" . }}
        {{- end }}
        {{- end }}
        {{- if eq .Values.db.type "sqlite" }}
        - name: db-data
          persistentVolumeClaim:
            claimName: {{ include "kansou.fullname" . }}-db
        {{- end }}
      {{- end }}
